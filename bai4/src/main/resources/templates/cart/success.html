<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body text-center">
            <h2 class="text-success mb-3">Đặt hàng thành công</h2>
            <p class="mb-2">Mã đơn hàng: <strong th:text="${order.id}"></strong></p>
            <p class="mb-2">Ngày đặt: <strong th:text="${order.orderDate}"></strong></p>
            <p class="mb-4">
                Tổng tiền:
                <strong th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}"></strong>
            </p>
            <p>
                Trạng thái:
                <strong th:text="${order.paid ? 'Đã thanh toán' : 'Chưa thanh toán'}"></strong>
            </p>

            <a th:href="@{/products}" class="btn btn-primary">Tiếp tục mua</a>
            <a th:href="@{/cart}" class="btn btn-outline-secondary">Quay lại giỏ hàng</a>
        </div>
    </div>

    <div class="mt-4">
        <h4>Chi tiết đơn hàng</h4>
        <table class="table table-bordered mt-3">
            <thead class="table-light">
            <tr>
                <th>Tên sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="detail : ${order.orderDetails}">
                <td th:text="${detail.product.name}"></td>
                <td th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${detail.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
