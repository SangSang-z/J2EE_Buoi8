<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h1 class="mb-4">Giỏ hàng của bạn</h1>

    <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info">
        Giỏ hàng đang trống.
    </div>

    <div th:unless="${#lists.isEmpty(cartItems)}">
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr>
                    <th style="width:260px;">Tên sản phẩm</th>
                    <th style="width:250px;">Hình ảnh</th>
                    <th style="width:190px;">Giá</th>
                    <th style="width:430px;">Số lượng</th>
                    <th style="width:220px;">Thành tiền</th>
                    <th style="width:180px;">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.name}">Laptop</td>
                    <td>
                        <img th:src="@{'/uploads/' + ${item.imageName}}"
                             alt="Product Image"
                             style="width:140px;height:95px;object-fit:cover;border:1px solid #ddd;padding:2px;">
                    </td>
                    <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}">2700000</td>
                    <td>
                        <form th:action="@{/cart/update}" method="post" class="d-flex gap-2 align-items-center">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="productId" th:value="${item.id}">
                            <input type="number"
                                   name="quantity"
                                   min="1"
                                   th:value="${item.quantity}"
                                   class="form-control"
                                   style="width:140px;">
                            <button type="submit" class="btn btn-secondary">
                                Cập nhật
                            </button>
                        </form>
                    </td>
                    <td th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')}">
                        13500000
                    </td>
                    <td>
                        <a th:href="@{/cart/remove/{id}(id=${item.id})}" class="btn btn-danger">
                            Xóa
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

            <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">

                <div class="d-flex gap-2">
                    <a th:href="@{/products}" class="btn btn-primary">
                        Tiếp tục mua
                    </a>

                    <a th:href="@{/cart/clear}" class="btn btn-warning">
                        Xóa toàn bộ
                    </a>

                    <form th:action="@{/cart/checkout}" method="post" style="display:inline-block;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-success">
                            Order
                        </button>
                    </form>
                </div>

                <h4 class="mb-0 fw-bold">
                    Total Price:
                    <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}">0</span>
                </h4>

            </div>
    </div>

    <div class="text-center text-muted mt-5 small">
        © 2025 - Phát triển ứng dụng với J2EE
    </div>
</div>

</body>
</html>
