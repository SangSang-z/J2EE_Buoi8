<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
        <h2 class="mb-0">Products</h2>

        <div class="d-flex flex-column align-items-end gap-3">
            <form class="d-flex" th:action="@{/products}" method="get">
                <input class="form-control me-2"
                       type="search"
                       name="q"
                       placeholder="Search"
                       th:value="${q}">
                <input type="hidden" name="size" th:value="${size}">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>

            <form th:action="@{/products}" method="get" class="d-flex align-items-center gap-2">
                <input type="hidden" name="q" th:value="${q}">
                <label class="mb-0">Hiển thị</label>
                <select name="size" class="form-select" style="width:110px;" onchange="this.form.submit()">
                    <option value="5" th:selected="${size == 5}">5</option>
                    <option value="10" th:selected="${size == 10}">10</option>
                    <option value="20" th:selected="${size == 20}">20</option>
                </select>
                <input type="hidden" name="page" value="0">
            </form>
        </div>
    </div>

    <div class="mt-4">
        <a class="btn btn-primary"
           th:href="@{/products/create}"
           sec:authorize="hasRole('ADMIN')">
            Create New Product
        </a>
    </div>

    <div class="table-responsive mt-4">
        <table class="table table-bordered align-middle">
            <thead class="table-light">
            <tr>
                <th style="width:70px;">#</th>
                <th>Name</th>
                <th style="width:180px;">Price</th>
                <th style="width:190px;">Image</th>
                <th style="width:220px;">Category Name</th>
                <th style="width:260px;">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p, st : ${products}">
                <td th:text="${currentPage * size + st.index + 1}">1</td>
                <td th:text="${p.name}">Laptop</td>
                <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}">2700000</td>
                <td>
                    <img th:if="${p.imageName != null}"
                         th:src="@{'/uploads/' + ${p.imageName}}"
                         alt="Product Image"
                         style="width:120px;height:75px;object-fit:cover;border:1px solid #ddd;padding:2px;">
                </td>
                <td th:text="${p.category != null ? p.category.name : 'N/A'}">Laptop</td>
                <td>
                    <div class="d-flex flex-wrap gap-1">
                        <a class="btn btn-secondary btn-sm"
                           th:href="@{/products/edit/{id}(id=${p.id})}"
                           sec:authorize="hasRole('ADMIN')">
                            Edit
                        </a>

                        <form th:action="@{/products/delete/{id}(id=${p.id})}"
                              method="post"
                              sec:authorize="hasRole('ADMIN')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-danger btn-sm" type="submit"
                                    onclick="return confirm('Xóa sản phẩm này?')">
                                Delete
                            </button>
                        </form>

                        <form th:action="@{/cart/add/{id}(id=${p.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-info btn-sm" type="submit">
                                Add to Cart
                            </button>
                        </form>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="6" class="text-center text-muted">No data</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage - 1}, size=${size}, q=${q})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/products(page=${i}, size=${size}, q=${q})}"
                   th:text="${i + 1}">
                    1
                </a>
            </li>

            <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(page=${currentPage + 1}, size=${size}, q=${q})}">
                    Next
                </a>
            </li>
        </ul>
    </nav>

    <div class="text-center text-muted mt-4 small">
        © 2025 - Phát triển ứng dụng với J2EE
    </div>
</div>

</body>
</html>
