<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${mode=='create' ? 'Create' : 'Edit'}">Create</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-3" style="max-width: 520px;">
  <h5 class="mb-3" th:text="${mode=='create' ? 'Create New Product' : 'Edit Product'}">Create</h5>

  <form th:action="${mode=='create'} ? @{/products/create} : @{/products/edit}"
        th:object="${form}" method="post" enctype="multipart/form-data"
        class="border rounded p-3">

    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" th:field="*{name}" placeholder="product Name">
      <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input class="form-control" th:field="*{price}" placeholder="0" type="number" min="1" max="9999999">
      <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Image</label>
      <input class="form-control" type="file" name="imageFile" accept="image/*">
      <!-- lỗi ảnh map vào imageName -->
      <div class="text-danger small" th:if="${#fields.hasErrors('imageName')}" th:errors="*{imageName}"></div>

      <div class="mt-2" th:if="${mode=='edit' && currentImage != null}">
        <span class="small text-muted">Current:</span><br>
        <img th:src="@{'/uploads/' + ${currentImage}}"
             style="width:120px;height:75px;object-fit:cover;border:1px solid #ddd;">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Category</label>
      <select class="form-select" th:field="*{categoryId}">
        <option value="" disabled selected>-- Chọn danh mục --</option>
        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
      </select>
      <div class="text-danger small" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
    </div>

    <button class="btn btn-success" type="submit"
            th:text="${mode=='create' ? 'Add Product' : 'Save'}">Add Product</button>
    <a class="btn btn-link" th:href="@{/products}">Back</a>
  </form>
</div>

</body>
</html>
